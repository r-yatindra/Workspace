<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Calculator</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="calculator-container">
        <h1>Calculator</h1>
        <div class="calculator">
            <input type="text" id="display" class="display" placeholder="0" readonly>
            <div class="buttons">
                <button class="btn function-btn" onclick="appendToDisplay('Math.sin(')">sin</button>
                <button class="btn function-btn" onclick="appendToDisplay('Math.cos(')">cos</button>
                <button class="btn function-btn" onclick="appendToDisplay('Math.sqrt(')">√</button>
                <button class="btn operator-btn" onclick="appendToDisplay('/')">/</button>
                
                <button class="btn" onclick="appendToDisplay('7')">7</button>
                <button class="btn" onclick="appendToDisplay('8')">8</button>
                <button class="btn" onclick="appendToDisplay('9')">9</button>
                <button class="btn operator-btn" onclick="appendToDisplay('*')">*</button>
                
                <button class="btn" onclick="appendToDisplay('4')">4</button>
                <button class="btn" onclick="appendToDisplay('5')">5</button>
                <button class="btn" onclick="appendToDisplay('6')">6</button>
                <button class="btn operator-btn" onclick="appendToDisplay('-')">-</button>
                
                <button class="btn" onclick="appendToDisplay('1')">1</button>
                <button class="btn" onclick="appendToDisplay('2')">2</button>
                <button class="btn" onclick="appendToDisplay('3')">3</button>
                <button class="btn operator-btn" onclick="appendToDisplay('+')">+</button>
                
                <button class="btn zero" onclick="appendToDisplay('0')">0</button>
                <button class="btn operator-btn" onclick="appendToDisplay('.')">.</button>
                <button class="btn equals-btn" onclick="calculate()">=</button>
            </div>
            <div class="controls">
                <button class="btn clear-btn" onclick="clearDisplay()">Clear</button>
                <button class="btn delete-btn" onclick="deleteLast()">Del</button>
            </div>
            <div id="error" class="error-message"></div>
        </div>
    </div>
    <script src="/static/script.js"></script>
</body>
</html>
